policies:
  # --------------------------------------------------------
  # STEP 1: The Mark (30-Day Warning)
  # --------------------------------------------------------
  - name: client-elastic-ip-inventory-mark
    resource: elastic-ip
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${MARK_ROLE_ARN}"
      packages: [jwt]
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: AssociationId
        value: absent
    actions:
      - type: mark-for-op
        op: release
        days: 30
      - type: notify
        template: default.html
        priority_header: '2'
        subject: "Action Required: Elastic IP Scheduled for Release in 30 Days"
        to:
          - "${ALERT_EMAIL}"
        transport:
          type: sqs
          queue: "${SQS_QUEUE_URL}"

  # --------------------------------------------------------
  # STEP 2: The Skew (1-Day Final Warning)
  # --------------------------------------------------------
  - name: client-elastic-ip-inventory-notify-warning
    resource: elastic-ip
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${MARK_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - type: value
        key: AssociationId
        value: absent
      - type: marked-for-op
        op: release
        skew: 1
    actions:
      - type: notify
        template: default.html
        priority_header: '1'
        subject: "FINAL WARNING: Elastic IP Will Be Released TOMORROW"
        to:
          - "${ALERT_EMAIL}"
        transport:
          type: sqs
          queue: "${SQS_QUEUE_URL}"

  # --------------------------------------------------------
  # STEP 3: The Cleanup (Execution & Final Notification)
  # --------------------------------------------------------
  - name: client-elastic-ip-inventory-cleanup
    resource: elastic-ip
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CLEANUP_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: release
      - "tag:keep": absent
      - type: value
        key: AssociationId
        value: absent
    actions:
      - type: release
      - type: notify
        template: default.html
        priority_header: '1'
        subject: "Alert: Elastic IP Has Been Released"
        to:
          - "${ALERT_EMAIL}"
        transport:
          type: sqs
          queue: "${SQS_QUEUE_URL}"
