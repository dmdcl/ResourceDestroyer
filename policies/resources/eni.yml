policies:
  # --------------------------------------------------------
  # STEP 1: The Mark (30-Day Warning)
  # --------------------------------------------------------
  - name: client-eni-inventory-mark
    resource: eni
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${MARK_ROLE_ARN}"
      packages: [jwt]
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: Status
        op: eq
        value: available
    actions:
      - type: mark-for-op
        op: delete
        days: 30
      - type: notify
        template: default.html
        priority_header: '2'
        subject: "Action Required: ENI Scheduled for Deletion in 30 Days"
        to:
          - "${ALERT_EMAIL}"
        transport:
          type: sqs
          queue: "${SQS_QUEUE_URL}"

  # --------------------------------------------------------
  # STEP 2: The Skew (1-Day Final Warning)
  # --------------------------------------------------------
  - name: client-eni-inventory-notify-warning
    resource: eni
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${MARK_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - type: value
        key: Status
        op: eq
        value: available
      - type: marked-for-op
        op: delete
        skew: 1
    actions:
      - type: notify
        template: default.html
        priority_header: '1'
        subject: "FINAL WARNING: ENI Will Be Deleted TOMORROW"
        to:
          - "${ALERT_EMAIL}"
        transport:
          type: sqs
          queue: "${SQS_QUEUE_URL}"

  # --------------------------------------------------------
  # STEP 3: The Cleanup (Execution & Final Notification)
  # --------------------------------------------------------
  - name: client-eni-inventory-cleanup
    resource: eni
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CLEANUP_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
      - type: value
        key: Status
        op: eq
        value: available
    actions:
      - type: delete
      - type: notify
        template: default.html
        priority_header: '1'
        subject: "Alert: ENI Has Been Deleted"
        to:
          - "${ALERT_EMAIL}"
        transport:
          type: sqs
          queue: "${SQS_QUEUE_URL}"
