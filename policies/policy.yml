policies:
  # --------------------------------------------------------
  # EC2 Instances
  # --------------------------------------------------------
  - name: client-ec2-inventory-mark
    resource: ec2
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
    actions:
      - type: mark-for-op
        op: terminate
        days: 30

  - name: client-ec2-inventory-cleanup
    resource: ec2
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: terminate
      - "tag:keep": absent
    actions:
      - type: terminate

  # --------------------------------------------------------
  # EBS Volumes (EC2 child)
  # --------------------------------------------------------
  - name: client-ebs-inventory-mark
    resource: ebs
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - State: available
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-ebs-inventory-cleanup
    resource: ebs
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
      - State: available
    actions:
      - type: delete

  # --------------------------------------------------------
  # EBS Snapshots (EBS child)
  # --------------------------------------------------------
  - name: client-ebs-snapshot-inventory-mark
    resource: ebs-snapshot
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: OwnerId
        op: eq
        value: "${ACCOUNT_ID}"
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-ebs-snapshot-inventory-cleanup
    resource: ebs-snapshot
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
    actions:
      - type: delete

  # --------------------------------------------------------
  # AMIs (EC2 child)
  # --------------------------------------------------------
  - name: client-ami-inventory-mark
    resource: ami
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: OwnerId
        op: eq
        value: "${ACCOUNT_ID}"
    actions:
      - type: mark-for-op
        op: deregister
        days: 30

  - name: client-ami-inventory-cleanup
    resource: ami
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: deregister
      - "tag:keep": absent
    actions:
      - type: deregister

  # --------------------------------------------------------
  # Elastic Network Interfaces
  # --------------------------------------------------------
  - name: client-eni-inventory-mark
    resource: eni
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: Status
        op: eq
        value: available
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-eni-inventory-cleanup
    resource: eni
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
      - type: value
        key: Status
        op: eq
        value: available
    actions:
      - type: delete

  # --------------------------------------------------------
  # Elastic IPs
  # --------------------------------------------------------
  - name: client-elastic-ip-inventory-mark
    resource: elastic-ip
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: AssociationId
        value: absent
    actions:
      - type: mark-for-op
        op: release
        days: 30

  - name: client-elastic-ip-inventory-cleanup
    resource: elastic-ip
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: release
      - "tag:keep": absent
      - type: value
        key: AssociationId
        value: absent
    actions:
      - type: release

  # --------------------------------------------------------
  # VPCs
  # --------------------------------------------------------
  - name: client-vpc-inventory-mark
    resource: vpc
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: IsDefault
        op: eq
        value: false
    actions:
      - type: mark-for-op
        op: delete-empty
        days: 30

  - name: client-vpc-inventory-cleanup
    resource: vpc
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete-empty
      - "tag:keep": absent
      - type: value
        key: IsDefault
        op: eq
        value: false
    actions:
      - type: delete-empty

  # --------------------------------------------------------
  # Internet Gateways (VPC child)
  # --------------------------------------------------------
  - name: client-igw-inventory-mark
    resource: internet-gateway
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: "Attachments[0].State"
        value: absent
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-igw-inventory-cleanup
    resource: internet-gateway
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
      - type: value
        key: "Attachments[0].State"
        value: absent
    actions:
      - type: delete

  # --------------------------------------------------------
  # NAT Gateways (VPC child)
  # --------------------------------------------------------
  - name: client-nat-inventory-mark
    resource: nat-gateway
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: State
        op: in
        value:
          - available
          - failed
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-nat-inventory-cleanup
    resource: nat-gateway
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
    actions:
      - type: delete

  # --------------------------------------------------------
  # Subnets (VPC child)
  # --------------------------------------------------------
  - name: client-subnet-inventory-mark
    resource: subnet
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: DefaultForAz
        op: eq
        value: false
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-subnet-inventory-cleanup
    resource: subnet
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
      - type: value
        key: DefaultForAz
        op: eq
        value: false
    actions:
      - type: delete

  # --------------------------------------------------------
  # Security Groups (VPC child)
  # --------------------------------------------------------
  - name: client-sg-inventory-mark
    resource: security-group
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: unused
      - type: value
        key: GroupName
        op: ne
        value: default
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-sg-inventory-cleanup
    resource: security-group
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
      - type: unused
      - type: value
        key: GroupName
        op: ne
        value: default
    actions:
      - type: delete

  # --------------------------------------------------------
  # RDS Instances
  # --------------------------------------------------------
  - name: client-rds-inventory-mark
    resource: rds
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-rds-inventory-cleanup
    resource: rds
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
    actions:
      - type: delete
        skip-snapshot: true

  # --------------------------------------------------------
  # RDS Snapshots (RDS child)
  # --------------------------------------------------------
  - name: client-rds-snapshot-inventory-mark
    resource: rds-snapshot
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: SnapshotType
        op: eq
        value: manual
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-rds-snapshot-inventory-cleanup
    resource: rds-snapshot
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
    actions:
      - type: delete

  # --------------------------------------------------------
  # RDS Subnet Groups (RDS child)
  # --------------------------------------------------------
  - name: client-rds-subnet-group-inventory-mark
    resource: rds-subnet-group
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-rds-subnet-group-inventory-cleanup
    resource: rds-subnet-group
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
    actions:
      - type: delete

  # --------------------------------------------------------
  # S3 Buckets
  # --------------------------------------------------------
  - name: client-s3-inventory-mark
    resource: s3
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-s3-inventory-cleanup
    resource: s3
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
    actions:
      - type: delete
        remove-contents: true

  # --------------------------------------------------------
  # IAM Roles
  # --------------------------------------------------------
  - name: client-iam-inventory-mark
    resource: iam-role
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - "tag:keep": absent
      - "tag:maid_status": absent
      - type: value
        key: RoleName
        op: not-in
        value:
          - "${CUSTODIAN_ROLE_NAME}"
    actions:
      - type: mark-for-op
        op: delete
        days: 30

  - name: client-iam-inventory-cleanup
    resource: iam-role
    mode:
      type: periodic
      schedule: "rate(1 day)"
      role: "${CUSTODIAN_ROLE_ARN}"
    filters:
      - type: marked-for-op
        op: delete
      - "tag:keep": absent
      - type: value
        key: RoleName
        op: not-in
        value:
          - "${CUSTODIAN_ROLE_NAME}"
    actions:
      - type: delete
